# project_a.yaml - プロジェクトA専用のPowerPoint生成設定

# --- スライド全体の基本設定 ---
slides:
  # 既存のPPTXテンプレートを使用する場合はパスを指定（社内ロゴ入りなど）
  # template_path: "project_a_template.pptx"
  template_path: null

  # スライドの画角（縦横比）
  # 16:9 (ワイド画面), 4:3 (標準), 16:10, A4
  # template_path が指定されている場合、この設定は無視されます。
  layout: "16:9"

# --- テキストのフォント設定 ---
# 実行するOSにインストールされているフォントを指定してください。
fonts:
  # タイトルの設定 (h1, h2)
  title:
    name: "Yu Gothic"      # 游ゴシック (和文)
    size_pt: 32           # タイトルを少し控えめに
    bold: true            # 太字
    color_rgb: [13, 60, 115] # プロジェクトAブランドカラー (深い青)

  # 本文（pタグ）の設定
  body:
    name: "Yu Gothic"
    size_pt: 20
    bold: false
    color_rgb: [30, 30, 30] # ほぼ黒 (濃い灰色)

  # 箇条書き（liタグ）レベル1の設定
  bullet_level_1:
    name: "Yu Gothic"
    size_pt: 18
    bold: false
    color_rgb: [50, 50, 50] # 少し薄い灰色

# --- 画像の配置設定 ---
images:
  default_height_inches: 4.5 # 画像のデフォルトの高さ（インチ）を少し大きく
  
  # 画像の配置位置（スライドの左上を (0,0) としたインチ単位）
  # [左からの距離, 上からの距離]
  # 16:9のスライド（10.0 x 5.625インチ）に対して、右下に配置
  position_inches: [5.2, 1.8]