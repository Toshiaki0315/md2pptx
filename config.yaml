# project_a.yaml - プロジェクトA専用のPowerPoint生成設定

# --- スライド全体の基本設定 ---
slides:
  # 既存のPPTXテンプレートを使用する場合はパスを指定（社内ロゴ入りなど）
  # template_path: "project_a_template.pptx"
  template_path: null

  # スライドの画角（縦横比）
  # 16:9 (ワイド画面), 4:3 (標準), 16:10, A4
  # template_path が指定されている場合、この設定は無視されます。
  layout: "16:9"

# --- テキストのフォント設定 ---
# 実行するOSにインストールされているフォントを指定してください。
fonts:
  title_h1:          # タイトルスライド（#）用
    name: "Meiryo"
    size_pt: 44
    bold: true
  title_h2:          # コンテンツスライド（##）用
    name: "Meiryo"
    size_pt: 32
    bold: true
  body:
    name: "Meiryo"
    size_pt: 20
  # 箇条書き（liタグ）レベル1の設定
  bullet_level_1:
    name: "Yu Gothic"
    size_pt: 18
    bold: false
    color_rgb: [50, 50, 50] # 少し薄い灰色
  inline_code:
    name: "Consolas"
    color_rgb: [220, 20, 60] # クリムゾンレッド
  code_block:
    name: "Consolas"
    size_pt: 12
    color_rgb: [0, 80, 160] # ブルーグレー
# --- 画像の配置設定 ---
images:
  default_height_inches: 3.5
  # 画像の配置位置（スライドの左上を (0,0) としたインチ単位）
  # [左からの距離, 上からの距離]
  # 16:9のスライド（10.0 x 5.625インチ）に対して、右下に配置
  # ここが設定されているとオートレイアウトが効かないので消すかコメントアウト  
  # position_inches: [5.2, 1.8]